services:
  - type: web
    name: speech-grammar-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: model-cache
      mountPath: /opt/render/project/src/.cache
      sizeGB: 2
